<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Splash White Water Rafting</title>
    <meta name="description" content="Splash White Water Rafting Contact Information">
    <meta name="author" content="Bryan Morgan">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="./images/z-splash.png" alt="White Water Rafting Logo" width="128" height="128">
    <nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="contact.html">Contact Us</a></li>
    </ul>
    </nav>
    </header>
    <main>
       <section class="address">
         <h3>Splash White Water Rafting</h3>
            <p>123 River Road</p>
            <p>Boise, ID 83702</p>
            <p>Phone: (555) 123-4567</p>
            <p>Email: info@splashwhitewater.com</p>
         </section>
        <section class="mapform">
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d61624.1291275554!2d-142.04518397955306!3d65.30636372792921!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1780605276623!5m2!1sen!2sus" width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="contact-form">
                <h3>Send Us a Message</h3>
                <form>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder="John Doe">

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="john.doe@example.com">
                    
                    <label for="purpose">Message Purpose:</label>                        
                        <div class="purpose-options">
                            <input type="radio" id="general" name="purpose" value="general">
                            <label for="general">General Inquiry</label><br>
                            <input type="radio" id="booking" name="purpose" value="booking">
                            <label for="booking">Reservation Question</label><br>
                            <input type="radio" id="feedback" name="purpose" value="feedback">
                            <label for="feedback">Website Suggestion</label>
                        </div>  

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="4" cols="50" ></textarea>
    
                    <div class="subscribe">
                    <label for="subscribe">
                        <input type="checkbox" id="subscribe" name="subscribe">
                        Please subscribe me to the monthly newsletter.
                    </label>
                    </div>

                    <button type="submit" value="Submit">Submit</button>
                </form>
            </div>
        </section>
        <section class="staff">
            <h3>We are here to serve you!</h3>
            <figure>
                <img src="./images/Larry.png" alt="Larry Johnson" width="200">
                <figcaption>Larry "Trust Me" Johnson - Customer Service Manager</figcaption>
            </figure>
            <figure>
                <img src="./images/maria.png" alt="Maria Hernandez" width="200">
                <figcaption>Maria "Hangry" Hernandez - Chief Lunch Associate</figcaption>
            </figure>
            <figure>
                <img src="./images/eustace.png" alt="Eustace Murphy" width="200">
                <figcaption>Eustace "Popeye" Murphy - Head River Guide</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Splash White Water Rafting  --  Bryan Morgan</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="./images/facebook.svg" alt="Facebook" width="32" height="32">
            </a>
            <a href="https://X.com" target="_blank">
                <img src="./images/x-bw.svg" alt="X" width="32" height="32">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="./images/instagram.svg" alt="Instagram" width="32" height="32">
            </a>
        </nav>

    </footer>
</body>

</html>
