<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 5 Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <header>
        <h1>Week 5 HTML and CSS Quiz</h1>
    </header>
    <form>
        <label for="q1">1. What does HTML stand for?</label><br>
        <input type="text" id="q1" name="q1"><br><br>

        <label for="q2">2. In CSS, how do you set the color of text for the body?</label><br>
        <textarea id="q2" name="q2" rows="4" cols="40" maxlength="200" placeholder="Enter your answer here..."></textarea><br><br>

        <label for="q3">3. What is the correct ending tag for a paragraph in HTML?</label><br>
        <select id="q3" name="q3">
            <option value="" selected disabled>Select an answer</option>
            <option value="a">a) &lt;/p&gt;</option>
            <option value="b">b) &lt;/paragraph&gt;</option>
            <option value="c">c) &lt;/par&gt;</option>
        </select><br><br>
       
        <label for="q4">4. How many pixels is the default top and bottom margin for a paragraph in HTML?</label><br>
        <input type="number" id="q4" name="q4"><br><br>

        <button type="submit" value="Submit">Submit</button>
    </form>
</body>
</html>
